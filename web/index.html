<!DOCTYPE html>
<html lang="am">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- SEO -->
    <title>ብልህStock — Smart Inventory Management</title>
    <meta name="description" content="ብልህStock: The smart inventory management system for Ethiopian businesses. Track stock, sales, purchases, and reports in real time." />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background-color: #1a1a2e;
      }

      /*
       * KEY: #root starts invisible. No React content — not even a single
       * white frame from Expo Router's initialization — can ever be seen by
       * the user until we explicitly call __hideSplash() and add .ready.
       * This is the definitive fix for the white-page flash.
       */
      #root {
        height: 100%;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      #root.ready {
        opacity: 1;
      }

      /* Instant branded splash — renders before any JS loads */
      #splash {
        position: fixed;
        inset: 0;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 9999;
        transition: opacity 0.2s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash-logo {
        font-size: 40px;
        font-weight: 800;
        color: #f5c518;
        letter-spacing: -1px;
        font-family: system-ui, -apple-system, sans-serif;
        text-shadow: 0 0 30px rgba(245, 197, 24, 0.4);
      }

      #splash-logo span {
        color: #6366F1;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366F1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Branded splash: visible immediately, before any JS -->
    <div id="splash">
      <div id="splash-logo">ብልህ<span>Stock</span></div>
      <div class="spinner"></div>
    </div>

    <!-- App root: invisible until __hideSplash() adds .ready -->
    <div id="root"></div>

    <script>
      // Called by React (in _layout.tsx) once auth + subscription are resolved.
      // Atomically: fades out the splash AND fades in #root together.
      // This guarantees the user NEVER sees any intermediate React state
      // (Expo Router init, white frames, spinner flashes, etc.)
      window.__hideSplash = function() {
        var splash = document.getElementById('splash');
        var root   = document.getElementById('root');
        if (root)   root.classList.add('ready');    // fade #root in
        if (splash) splash.classList.add('hidden'); // fade splash out
        setTimeout(function() {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 250);
      };
      // Failsafe: if React never calls __hideSplash (network error, crash, etc.)
      // force-show the app after 15s so the user isn't stuck forever.
      setTimeout(window.__hideSplash, 15000);
    </script>
  </body>
</html>
